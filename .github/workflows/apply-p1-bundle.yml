name: Apply P1 simulation bundle

on:
  push:
    branches:
      - planning/repository-foundation
    paths:
      - tools/bootstrap/p1_changes.b64

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Apply bundle
        run: |
          base64 --decode tools/bootstrap/p1_changes.b64 | tar -xzf -
          rm tools/bootstrap/p1_changes.b64
          rm .github/workflows/apply-p1-bundle.yml
      - name: Validate implementation
        run: |
          uv sync --frozen
          uv run python tools/validator/validate_data.py
          uv run python -m unittest discover -s tests -v
          uv run python tools/balancer/simulate_year.py
          uv run python tools/simulation/run_regression.py --years 100 --seed 2026
          uv run python -m compileall -q src tools tests
      - name: Commit generated implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: implement headless P1 simulation core"
          git push origin HEAD:${{ github.ref_name }}
