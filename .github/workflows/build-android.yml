name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "game/godot/**"
      - ".github/workflows/build-android.yml"

permissions:
  contents: read

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify canonical Godot project
        run: |
          test -f game/godot/project.godot
          test -f game/godot/scenes/main.tscn
          test -f game/godot/export_presets.cfg

      - name: Import project headlessly
        run: godot --headless --path game/godot --editor --quit

      - name: Export Android debug APK
        run: |
          mkdir -p build/android
          godot --headless --path game/godot --export-debug "Android Debug" ../../build/android/landwirtschaftssimulator-debug.apk
          test -s build/android/landwirtschaftssimulator-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: landwirtschaftssimulator-debug-apk
          path: build/android/landwirtschaftssimulator-debug.apk
          if-no-files-found: error
          retention-days: 30

  publish-github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-debug-apk
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: landwirtschaftssimulator-debug-apk
          path: release

      - name: Publish tagged GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release/landwirtschaftssimulator-debug.apk \
            --repo "${GITHUB_REPOSITORY}" \
            --generate-notes \
            --title "Landwirtschaftssimulator ${GITHUB_REF_NAME}"
