name: Build Android APK

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "game/godot/**"
      - ".github/workflows/build-android.yml"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "game/godot/**"
      - ".github/workflows/build-android.yml"

permissions:
  contents: read

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify canonical Godot project
        run: |
          test -f game/godot/project.godot
          test -f game/godot/scenes/main.tscn
          test -f game/godot/export_presets.cfg

      - name: Export Android debug APK
        id: godot_export
        uses: firebelley/godot-export@v8.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          relative_project_path: ./game/godot
          presets_to_export: Android Debug
          export_debug: true
          use_preset_export_path: true
          cache: true
          verbose: true

      - name: Verify exported APK
        run: test -s build/android/landwirtschaftssimulator-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: landwirtschaftssimulator-debug-apk
          path: build/android/landwirtschaftssimulator-debug.apk
          if-no-files-found: error
          retention-days: 30

  publish-github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-debug-apk
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: landwirtschaftssimulator-debug-apk
          path: release

      - name: Publish tagged GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release/landwirtschaftssimulator-debug.apk \
            --repo "${GITHUB_REPOSITORY}" \
            --generate-notes \
            --title "Landwirtschaftssimulator ${GITHUB_REF_NAME}"
