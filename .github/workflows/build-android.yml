name: Build Android APK

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "game/godot/**"
      - ".github/workflows/build-android.yml"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "game/godot/**"
      - ".github/workflows/build-android.yml"

permissions:
  contents: read

env:
  GODOT_VERSION: "4.3-stable"
  GODOT_TEMPLATE_DIR: "4.3.stable"

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Verify canonical Godot project
        run: |
          test -f game/godot/project.godot
          test -f game/godot/scenes/main.tscn
          test -f game/godot/export_presets.cfg

      - name: Download Godot and export templates
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/godot" "$HOME/.local/share/godot/export_templates/$GODOT_TEMPLATE_DIR"
          curl -fL --retry 3 \
            "https://github.com/godotengine/godot/releases/download/$GODOT_VERSION/Godot_v${GODOT_VERSION}_linux.x86_64.zip" \
            -o "$RUNNER_TEMP/godot/godot.zip"
          curl -fL --retry 3 \
            "https://github.com/godotengine/godot/releases/download/$GODOT_VERSION/Godot_v${GODOT_VERSION}_export_templates.tpz" \
            -o "$RUNNER_TEMP/godot/templates.tpz"
          unzip -q "$RUNNER_TEMP/godot/godot.zip" -d "$RUNNER_TEMP/godot/bin"
          unzip -q "$RUNNER_TEMP/godot/templates.tpz" -d "$RUNNER_TEMP/godot/templates"
          cp -R "$RUNNER_TEMP/godot/templates/templates/." "$HOME/.local/share/godot/export_templates/$GODOT_TEMPLATE_DIR/"
          chmod +x "$RUNNER_TEMP/godot/bin/Godot_v${GODOT_VERSION}_linux.x86_64"
          echo "GODOT_BIN=$RUNNER_TEMP/godot/bin/Godot_v${GODOT_VERSION}_linux.x86_64" >> "$GITHUB_ENV"

      - name: Configure Godot Android export
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.config/godot" "$HOME/.local/share/godot"
          keytool -genkeypair \
            -keystore "$HOME/.local/share/godot/debug.keystore" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000
          cat > "$HOME/.config/godot/editor_settings-4.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/java_sdk_path = "$JAVA_HOME"
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          export/android/debug_keystore = "$HOME/.local/share/godot/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Import Godot project
        shell: bash
        run: "$GODOT_BIN --headless --path game/godot --editor --quit"

      - name: Export Android debug APK
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build/android
          "$GODOT_BIN" --headless --verbose --path game/godot \
            --export-debug "Android Debug" ../../build/android/landwirtschaftssimulator-debug.apk \
            2>&1 | tee build/android/export.log

      - name: Verify exported APK
        run: test -s build/android/landwirtschaftssimulator-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: landwirtschaftssimulator-debug-apk
          path: |
            build/android/landwirtschaftssimulator-debug.apk
            build/android/export.log
          if-no-files-found: error
          retention-days: 30

      - name: Upload export log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-export-failure-log
          path: build/android/export.log
          if-no-files-found: ignore
          retention-days: 7

  publish-github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-debug-apk
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: landwirtschaftssimulator-debug-apk
          path: release

      - name: Publish tagged GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release/landwirtschaftssimulator-debug.apk \
            --repo "${GITHUB_REPOSITORY}" \
            --generate-notes \
            --title "Landwirtschaftssimulator ${GITHUB_REF_NAME}"
